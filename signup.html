<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام</title>
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/root.css">
    <link rel="stylesheet" href="style/signup.css">
</head>

<body>
    <svg class="custom-svg">
        <symbol id="home" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="currentColor">
            <path
                d="M12 18.75C11.59 18.75 11.25 18.41 11.25 18V15C11.25 14.59 11.59 14.25 12 14.25C12.41 14.25 12.75 14.59 12.75 15V18C12.75 18.41 12.41 18.75 12 18.75Z" />
            <path
                d="M17.6009 22.5601H6.40094C4.58094 22.5601 2.92094 21.1601 2.62094 19.3701L1.29094 11.4001C1.07094 10.1601 1.68094 8.57007 2.67094 7.78007L9.60094 2.23007C10.9409 1.15007 13.0509 1.16007 14.4009 2.24007L21.3309 7.78007C22.3109 8.57007 22.9109 10.1601 22.7109 11.4001L21.3809 19.3601C21.0809 21.1301 19.3809 22.5601 17.6009 22.5601ZM11.9909 2.93007C11.4609 2.93007 10.9309 3.09007 10.5409 3.40007L3.61094 8.96007C3.05094 9.41007 2.65094 10.4501 2.77094 11.1601L4.10094 19.1201C4.28094 20.1701 5.33094 21.0601 6.40094 21.0601H17.6009C18.6709 21.0601 19.7209 20.1701 19.9009 19.1101L21.2309 11.1501C21.3409 10.4501 20.9409 9.39007 20.3909 8.95007L13.4609 3.41007C13.0609 3.09007 12.5209 2.93007 11.9909 2.93007Z" />
        </symbol>
    </svg>
    <main>
        <section>
            <div class="container-fluid">
                <div class="login-container">
                    <!-- Entry Account -->
                    <div class="entry-account">
                        <!-- Top Image -->
                        <div class="top-image">
                            <img src="image/login/8596636160953640368fdca00d60b69708ae02c9.png" alt="">
                        </div>
                        <!-- Form -->
                        <div class="entry-form">
                            <h1 class="entry-form-title">ثبت‌نام</h1>
                            <form class="login-form" action="" method="get">
                                <div class="login-form-input">
                                    <label for="">نام و نام خانوادگی *</label>
                                    <input class="login-input" type="text" placeholder="نام خود را به فارسی وارد کنید">
                                </div>
                                <div class="login-form-input">
                                    <label for="">شماره تلفن همراه *</label>
                                    <input class="login-input" type="tel" placeholder="*********09 یا Example@gmail.com">
                                    <p class="phone-message">لطفا شماره همراه خود را به صورت صحیح وارد نمایید</p>
                                </div>
                                <div class="login-form-input">
                                    <label for="">ایمیل (اختیاری)</label>
                                    <input class="login-input" type="email" placeholder="Example@gmail.com">
                                    <p class="email-message">لطفا شماره همراه خود را به صورت صحیح وارد نمایید</p>
                                </div>
                                <div class="login-form-btn">
                                    <input class="login-button" type="button" value="تایید">
                                </div>
                                <div class="login-p">
                                    <input type="checkbox" name="" id="">
                                    <p>قوانین و مقررات را خوانده و قبول دارم.</p>
                                </div>
                            </form>
                        </div>
                        <!-- Bottom Image -->
                        <div class="bottom-image">
                            <img src="image/login/f97f1bf090c48eece4be53e14cb9fe0b75682e36.png" alt="">
                        </div>
                    </div>
                    <!-- Image -->
                    <div class="back-home-container">
                        <div class="back-home-background-image"></div>
                        <div class="overlay"></div>
                        <div class="content-back-home"> <!-- Logo -->
                            <img src="image/Logo.svg" alt="">
                            <!-- Back Home -->
                            <div>
                                <a class="icon-box" href="index.html"> <svg>
                                        <use href="#home"></use>
                                    </svg>
                                    <h3>برگشت به صفحه اصلی</h3>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
