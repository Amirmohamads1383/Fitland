    <main>
        <section>
            <div class="container-fluid">
                <div class="login-container">
                    <!-- Entry Account -->
                    <div class="entry-account">
                        <!-- Top Image -->
                        <div class="top-image">

                        <div class="entry-form">
                            <h1 class="entry-form-title">کد تایید را وارد کنید</h1>

                                    <input class="input-number" type="text" maxlength="1">

                                    <div class="sent-code-text">

                                    </div>

                                     <div class="resent-code">

                                </div>
                                <div class="login-form-btn">

                            <div class="back-page">

                        </div>
